version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: cinerate-db
    environment:
      POSTGRES_DB: cinerate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8085:8085"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: default

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: